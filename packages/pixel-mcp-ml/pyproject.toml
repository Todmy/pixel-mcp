[project]
name = "pixel-mcp-ml"
version = "0.1.0"
description = "ML extras for pixel-mcp — DINOv2 perceptual similarity (Level 1) and VLM verification (Level 2)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Dmytro Tolok" }]
dependencies = [
    "Pillow>=10.0",
    "numpy>=1.26",
    "typer>=0.12",
    "httpx>=0.27",
]

[project.optional-dependencies]
dinov2 = [
    "transformers>=4.40",
    "torch>=2.0",
    "safetensors>=0.4",
]
vlm = [
    "anthropic>=0.40",
]
omniparser = [
    "transformers>=4.40",
    "torch>=2.0",
    "safetensors>=0.4",
    "huggingface-hub>=0.24",
]

[project.scripts]
pixel-mcp-ml = "pixel_mcp_ml.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pixel_mcp_ml"]
