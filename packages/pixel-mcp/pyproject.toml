[project]
name = "pixel-mcp"
version = "0.1.0"
description = "Figma <-> Browser convergence harness with escalation gates (CLI + MCP server)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Dmytro Tolok" }]
dependencies = [
    "pixel-tools-shared",
    "typer>=0.12",
    "mcp>=1.0",
]

[project.scripts]
pixel-mcp = "pixel_mcp.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pixel_mcp"]
